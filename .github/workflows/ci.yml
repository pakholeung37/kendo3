name: CI

on:
    push:
        paths:
            - '.github/workflows/ci.yml'
            - 'apps/server/**'
            - 'package.json'
            - 'bun.lock'
            - 'scripts/**'
            - 'Dockerfile'
            - 'docker-compose.yml'
    pull_request:
        paths:
            - '.github/workflows/ci.yml'
            - 'apps/server/**'
            - 'package.json'
            - 'bun.lock'
            - 'scripts/**'
            - 'Dockerfile'
            - 'docker-compose.yml'

jobs:
    test:
        runs-on: ubuntu-latest
        timeout-minutes: 20
        services:
            redis:
                image: redis
                ports:
                    - 6379:6379
        steps:
            - uses: actions/checkout@v4
            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: 1.3.9
            - run: bun install --frozen-lockfile
            - run: bun run format:check
            - run: bun run lint
            - run: bun run build
            - run: bun run test
              env:
                  REDIS_URL: redis://127.0.0.1:6379/
            - run: bun run smoke:bun
